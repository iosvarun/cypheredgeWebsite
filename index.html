<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>CypherEdge | Next-Gen AI Solutions & Software Development Company</title>
    <meta name="description" content="CypherEdge Pvt. Ltd. delivers cutting-edge software engineering, custom AI solutions (AI Agents, LLMs), high-performance iOS/Android app development, and ERP systems for enterprises." />
    <meta name="keywords" content="CypherEdge, AI solutions, AI Agents, mobile app development, iOS apps, Android apps, custom ERP, web development, software company, Akash Verma, Varun Kumar" />
    <meta name="author" content="CypherEdge Pvt. Ltd." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="CypherEdge | Next-Gen AI Solutions & Software Development" />
    <meta property="og:description" content="Empowering enterprises with custom AI agents, robust backends, and premium iOS/Android mobile apps." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cypheredge.onrender.com/" />
    <meta property="og:image" content="https://cypheredge.onrender.com/assets/og_image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CypherEdge | Next-Gen AI Solutions & Software Development" />
    <meta name="twitter:description" content="Empowering enterprises with custom AI agents, robust backends, and premium iOS/Android mobile apps." />
    <meta name="twitter:image" content="https://cypheredge.onrender.com/assets/og_image.png" />
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <!-- Premium Loading Preloader -->
      <div id="app-preloader" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #06060f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Outfit', sans-serif;
      ">
        <div style="
          position: relative;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1.5rem;
        ">
          <!-- Pulsing Logo -->
          <img src="/favicon.png" alt="Loading..." style="
            width: 80px;
            height: 80px;
            animation: preloader-pulse 1.8s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
          " />
          
          <!-- Loading Text / Spinner -->
          <div style="
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
          ">
            <div class="preloader-spinner" style="
              width: 32px;
              height: 32px;
              border: 2px solid rgba(255, 255, 255, 0.05);
              border-top-color: #3b82f6; /* primary neon blue */
              border-radius: 50%;
              animation: preloader-spin 0.8s linear infinite;
            "></div>
            <span style="
              font-size: 0.85rem;
              color: #94a3b8;
              font-weight: 500;
              letter-spacing: 0.1em;
              text-transform: uppercase;
              margin-top: 0.5rem;
            ">Initializing Systems...</span>
          </div>
        </div>
      </div>
      
      <style>
        @keyframes preloader-pulse {
          0% { transform: scale(0.92); opacity: 0.6; }
          50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.25)); }
          100% { transform: scale(0.92); opacity: 0.6; }
        }
        @keyframes preloader-spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
